services:
  - type: web
    name: stadiumpulse-26
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: stadiumpulse-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: APP_ACCESS_TOKEN
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Requires manual user input during deployment
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: CUSTOM_SCENARIO_FILE
        value: /var/data/custom-scenarios.json
      - key: DISABLE_AUTH
        value: "false"
